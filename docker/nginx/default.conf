server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public; # racine web

    location = / {
        rewrite ^ /index.php last; # front controller
    }

    location / {
        try_files $uri @front; # fallback MVC
    }

    location @front {
        rewrite ^ /index.php?$query_string last; # garde query string
    }

    location /assets/ {
        alias /var/www/html/public/assets/; # assets statiques
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Servir les fichiers uploads (montés via volume Docker)
    location /uploads/ {
        alias /var/www/html/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php; # script unique
        fastcgi_param SCRIPT_NAME /index.php; # nom script
    }
}
